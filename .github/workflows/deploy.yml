name: Deploy to Server

on:
  push:
    branches:
      - main  # 或者你的主分支名，如 'master' 或 'dev'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境 (根据你的项目需求调整版本)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 或者 20, 取决于你的项目
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建项目
      - name: Build project
        run: npm run build

      # 5. 通过 SSH 部署文件
      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          SOURCE: "dist/"       # 上传本地的 dist 文件夹内容
          TARGET: "${{ secrets.TARGET_PATH }}/dist" # 上传到服务器的 /opt/jufazhishang/dist
          # 注意：这里我们直接覆盖 dist 目录，保持目录结构清晰
          
           # 【关键】上传后执行的脚本，用于修复权限
          SCRIPT_AFTER: |
            echo "🔧 Fixing permissions for Nginx..."
            
            # 1. 确保整个目录树对“其他人”是可读和可执行的 (755 对于静态网站是安全的)
            # 这样无论 Nginx 跑在 www-data 还是 nginx 用户下，都能读取
            chmod -R 755 ${{ secrets.TARGET_PATH }}/dist
            
            # 2. (可选但推荐) 如果知道 Nginx 的具体运行用户，可以直接改所有者
            # 比如 Ubuntu 上是 www-data, CentOS 上是 nginx
            # 下面这行需要你先确认服务器上的用户是谁，如果不确定，只保留上面的 chmod 755 即可
            # chown -R www-data:www-data ${{ secrets.TARGET_PATH }}/dist
            
            echo "🔄 Reloading Nginx..."
            # 因为是 root 用户执行，所以不需要 sudo
            systemctl reload nginx
            
            echo "✅ Deployment finished!"