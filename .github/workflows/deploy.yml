name: Deploy to Server

on:
  push:
    branches:
      - main  # 或者你的主分支名，如 'master' 或 'dev'
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - github/workflows/deploy.yml

jobs:
  deploy:
    environment: baiduYunServer
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境 (根据你的项目需求调整版本)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 或者 20, 取决于你的项目
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建项目
      - name: Build project
        run: npm run build

      # 5. 通过 SSH 部署文件
      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          SOURCE: "dist/"       # 上传本地的 dist 文件夹内容
          TARGET: "${{ secrets.TARGET_PATH }}/dist" # 上传到服务器的 /opt/jufazhishang/dist
          # 注意：这里我们直接覆盖 dist 目录，保持目录结构清晰
          
           # 【关键】上传后执行的脚本，用于修复权限
          SCRIPT_AFTER: |
            echo "🔧 Fixing permissions for Nginx..."
            
            # 1. 确保整个目录树对“其他人”是可读和可执行的
            chmod -R 755 ${{ secrets.TARGET_PATH }}/dist
            
            echo "🔄 Reloading Nginx..."
            systemctl reload nginx
            
            echo "✅ Deployment finished!"